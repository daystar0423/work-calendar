<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 스케줄러</title>

<!-- PWA 메타 -->
<meta name="theme-color" content="#161920">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="스케줄러">
<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0d0f14; --surface:#161920; --surface2:#1e2230; --surface3:#252a3a;
  --border:#2a2f40; --accent:#5b8dee; --accent2:#e85d75; --accent3:#f0a500;
  --accent4:#3ecf8e; --text:#e8eaf0; --text2:#8891aa; --text3:#4e5570;
  --task-h:26px; --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ═══ HEADER ═══ */
header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;gap:10px;flex-wrap:wrap;}
.header-left{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.logo{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--accent);letter-spacing:.5px;white-space:nowrap;}
.month-nav{display:flex;align-items:center;gap:6px;}
.month-nav button{background:var(--surface2);border:1px solid var(--border);color:var(--text2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.month-nav button:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
#monthLabel{font-size:.95rem;font-weight:700;min-width:105px;text-align:center;white-space:nowrap;}
.header-right{display:flex;gap:8px;align-items:center;}
.hbtn{padding:8px 14px;border-radius:9px;border:none;cursor:pointer;font-family:'Pretendard',sans-serif;font-size:.8rem;font-weight:700;transition:all .2s;white-space:nowrap;position:relative;}
.hbtn-ghost{background:var(--surface2);border:1px solid var(--border);color:var(--text2);}
.hbtn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.hbtn-urgent{background:linear-gradient(135deg,#e85d75,#c0392b);color:#fff;box-shadow:0 4px 16px rgba(232,93,117,.35);}
.hbtn-urgent:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(232,93,117,.5);}
.hbtn-add{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(91,141,238,.3);}
.hbtn-add:hover{background:#4a7ce0;transform:translateY(-1px);}
.urgent-count{position:absolute;top:-6px;right:-6px;background:#fff;color:var(--accent2);font-size:.65rem;font-weight:800;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center;border:2px solid #e85d75;}
.urgent-count.show{display:flex;}

/* ═══ NOTIF BANNER ═══ */
.notif-banner{background:rgba(91,141,238,.12);border-bottom:1px solid rgba(91,141,238,.2);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:.78rem;}
.notif-banner button{padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:'Pretendard',sans-serif;font-size:.75rem;font-weight:700;white-space:nowrap;}
.notif-banner.hidden{display:none;}
.notif-denied{background:rgba(232,93,117,.1);border-bottom:1px solid rgba(232,93,117,.18);}

/* ═══ LEGEND ═══ */
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:8px 20px;max-width:1400px;margin:0 auto;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--text2);}
.legend-dot{width:9px;height:9px;border-radius:3px;}

/* ═══ CALENDAR ═══ */
.calendar-wrap{padding:8px 16px 24px;max-width:1400px;margin:0 auto;}
.day-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:5px;}
.day-label{text-align:center;font-size:.72rem;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;padding:5px 0;}
.day-label:first-child{color:var(--accent2);}
.day-label:last-child{color:var(--accent);}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);min-height:118px;padding:7px 5px 5px;display:flex;flex-direction:column;gap:2px;cursor:default;transition:border-color .2s;position:relative;overflow:hidden;}
.cal-cell:hover{border-color:#3a4560;}
.cal-cell.other-month{opacity:.32;}
.cal-cell.today{border-color:var(--accent);background:rgba(91,141,238,.06);}
.day-num{font-size:.78rem;font-weight:700;color:var(--text2);align-self:flex-start;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:1px;}
.cal-cell.today .day-num{background:var(--accent);color:#fff;}
.sun .day-num{color:var(--accent2) !important;}
.sat .day-num{color:#6fa0ff !important;}

/* ═══ TASK BARS ═══ */
.task-bar{height:var(--task-h);border-radius:5px;padding:0 6px;font-size:.68rem;font-weight:600;display:flex;align-items:center;gap:3px;overflow:hidden;white-space:nowrap;cursor:pointer;transition:filter .15s,transform .15s;}
.task-bar:hover{filter:brightness(1.2);transform:translateY(-1px);}
.task-bar .tb-icon{font-size:.65rem;flex-shrink:0;}
.task-bar .tb-label{overflow:hidden;text-overflow:ellipsis;flex:1;}
.task-bar .tb-dot{width:5px;height:5px;background:var(--accent2);border-radius:50%;flex-shrink:0;animation:blink 1.2s ease-in-out infinite;}
.cat-task{background:rgba(91,141,238,.2);color:#87aaff;border-left:3px solid #5b8dee;}
.cat-meet{background:rgba(240,165,0,.16);color:#ffc043;border-left:3px solid #f0a500;}
.cat-dead{background:rgba(232,93,117,.2);color:#ff8099;border-left:3px solid #e85d75;}
.cat-done{background:rgba(62,207,142,.08);color:#3ecf8e;border-left:3px solid #3ecf8e;opacity:.55;text-decoration:line-through;}
.alarm-badge{position:absolute;top:5px;right:5px;background:var(--accent2);color:#fff;font-size:.56rem;font-weight:800;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.more-badge{font-size:.63rem;color:var(--text3);padding:1px 4px;cursor:pointer;}
.more-badge:hover{color:var(--accent);}

/* ═══ DETAIL POPUP ═══ */
.detail-popup{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:15px 17px 13px;width:270px;box-shadow:0 14px 50px rgba(0,0,0,.6);z-index:300;display:none;}
.detail-popup.show{display:block;}
.dp-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.dp-header h4{font-size:.88rem;font-weight:700;flex:1;line-height:1.3;padding-right:8px;}
.dp-close{background:var(--surface2);border:none;color:var(--text2);width:24px;height:24px;border-radius:6px;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.dp-close:hover{background:var(--accent2);color:#fff;}
.detail-row{display:flex;gap:8px;margin-bottom:5px;font-size:.79rem;color:var(--text2);align-items:flex-start;}
.dr-label{color:var(--text3);min-width:52px;font-size:.68rem;letter-spacing:.04em;text-transform:uppercase;padding-top:1px;}
.detail-actions{display:flex;gap:6px;margin-top:12px;}
.da-btn{flex:1;padding:7px 4px;border-radius:8px;border:none;cursor:pointer;font-family:'Pretendard',sans-serif;font-size:.7rem;font-weight:700;transition:all .2s;}
.da-edit{background:rgba(91,141,238,.15);color:var(--accent);border:1px solid rgba(91,141,238,.3);}
.da-edit:hover{background:rgba(91,141,238,.28);}
.da-done{background:rgba(62,207,142,.12);color:var(--accent4);border:1px solid rgba(62,207,142,.3);}
.da-done:hover{background:rgba(62,207,142,.25);}
.da-del{background:rgba(232,93,117,.1);color:var(--accent2);border:1px solid rgba(232,93,117,.25);}
.da-del:hover{background:rgba(232,93,117,.22);}

/* ═══ MODAL ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);z-index:400;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:26px 26px 22px;box-shadow:0 28px 70px rgba(0,0,0,.7);transform:translateY(24px) scale(.97);transition:transform .25s;}
.modal-overlay.open .modal{transform:translateY(0) scale(1);}
.modal-title{font-size:1.1rem;font-weight:800;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:var(--surface2);border:none;color:var(--text2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.modal-close:hover{background:var(--accent2);color:#fff;}
.form-group{margin-bottom:15px;}
.form-group label{display:block;font-size:.72rem;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 13px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:.86rem;transition:border-color .2s;outline:none;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);}
.form-group textarea{resize:vertical;min-height:65px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.type-selector{display:flex;gap:7px;}
.type-btn{flex:1;padding:9px 6px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:'Pretendard',sans-serif;font-size:.78rem;font-weight:700;text-align:center;transition:all .2s;}
.type-btn.active{border-color:var(--accent);background:rgba(91,141,238,.14);color:var(--accent);}
.type-btn[data-t="meeting"].active{border-color:var(--accent3);background:rgba(240,165,0,.1);color:var(--accent3);}

/* 유형별 필드 표시/숨기기 */
.task-only{display:block;}
.meet-only{display:none;}
.showing-meeting .task-only{display:none;}
.showing-meeting .meet-only{display:block;}

.modal-actions{display:flex;gap:9px;margin-top:20px;}
.btn-cancel{flex:1;padding:12px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-family:'Pretendard',sans-serif;font-weight:700;transition:all .2s;}
.btn-cancel:hover{border-color:var(--accent2);color:var(--accent2);}
.btn-save{flex:2;padding:12px;border-radius:10px;background:var(--accent);border:none;color:#fff;cursor:pointer;font-family:'Pretendard',sans-serif;font-weight:800;font-size:.9rem;box-shadow:0 4px 18px rgba(91,141,238,.35);transition:all .2s;}
.btn-save:hover{background:#4a7ce0;transform:translateY(-1px);}

/* ═══ ALARM POPUP ═══ */
.alarm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.87);backdrop-filter:blur(14px);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s;}
.alarm-overlay.open{opacity:1;pointer-events:all;}
.alarm-popup{background:var(--surface);border-radius:24px;width:100%;max-width:400px;overflow:hidden;box-shadow:0 32px 90px rgba(0,0,0,.9);transform:scale(.85) translateY(30px);transition:transform .35s cubic-bezier(.34,1.56,.64,1);}
.alarm-overlay.open .alarm-popup{transform:scale(1) translateY(0);}
.alarm-header{padding:30px 28px 22px;text-align:center;}
.alarm-header.type-start{background:linear-gradient(160deg,rgba(91,141,238,.22),rgba(91,141,238,.04));border-bottom:1px solid rgba(91,141,238,.18);}
.alarm-header.type-warn{background:linear-gradient(160deg,rgba(232,93,117,.24),rgba(232,93,117,.04));border-bottom:1px solid rgba(232,93,117,.2);}
.alarm-header.type-meet2h{background:linear-gradient(160deg,rgba(240,165,0,.22),rgba(240,165,0,.04));border-bottom:1px solid rgba(240,165,0,.18);}
.alarm-header.type-meet0{background:linear-gradient(160deg,rgba(62,207,142,.2),rgba(62,207,142,.04));border-bottom:1px solid rgba(62,207,142,.18);}
.alarm-icon-wrap{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin:0 auto 14px;animation:iconRing .55s ease-in-out infinite alternate;}
.type-start .alarm-icon-wrap{background:rgba(91,141,238,.22);}
.type-warn .alarm-icon-wrap{background:rgba(232,93,117,.22);}
.type-meet2h .alarm-icon-wrap{background:rgba(240,165,0,.2);}
.type-meet0 .alarm-icon-wrap{background:rgba(62,207,142,.18);}
@keyframes iconRing{from{transform:rotate(-9deg) scale(1)}to{transform:rotate(9deg) scale(1.1)}}
.alarm-kind{font-size:.7rem;font-weight:800;letter-spacing:.13em;text-transform:uppercase;margin-bottom:7px;}
.type-start .alarm-kind{color:var(--accent);}
.type-warn .alarm-kind{color:var(--accent2);}
.type-meet2h .alarm-kind{color:var(--accent3);}
.type-meet0 .alarm-kind{color:var(--accent4);}
.alarm-title{font-size:1.3rem;font-weight:800;margin-bottom:5px;line-height:1.3;}
.alarm-sub{font-size:.82rem;color:var(--text2);}
.alarm-body{padding:18px 26px 24px;}
.alarm-meta{background:var(--surface2);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;flex-direction:column;gap:7px;}
.alarm-meta-row{display:flex;justify-content:space-between;font-size:.8rem;}
.alarm-meta-row span:first-child{color:var(--text3);}
.alarm-meta-row span:last-child{font-weight:600;}
.alarm-confirm{width:100%;padding:14px;border-radius:12px;border:none;font-family:'Pretendard',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;transition:all .2s;}
.type-start .alarm-confirm{background:var(--accent);color:#fff;box-shadow:0 5px 22px rgba(91,141,238,.45);}
.type-warn .alarm-confirm{background:var(--accent2);color:#fff;box-shadow:0 5px 22px rgba(232,93,117,.45);}
.type-meet2h .alarm-confirm{background:var(--accent3);color:#fff;box-shadow:0 5px 22px rgba(240,165,0,.45);}
.type-meet0 .alarm-confirm{background:var(--accent4);color:#fff;box-shadow:0 5px 22px rgba(62,207,142,.45);}
.alarm-confirm:hover{transform:translateY(-2px);filter:brightness(1.1);}
.alarm-queue-info{text-align:center;font-size:.71rem;color:var(--text3);margin-top:10px;}

/* ═══ URGENT PANEL ═══ */
.urgent-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(5px);z-index:500;opacity:0;pointer-events:none;transition:opacity .25s;}
.urgent-overlay.open{opacity:1;pointer-events:all;}
.urgent-panel{position:fixed;top:0;right:0;bottom:0;width:340px;max-width:100%;background:var(--surface);border-left:1px solid var(--border);z-index:501;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:-14px 0 55px rgba(0,0,0,.5);}
.urgent-overlay.open .urgent-panel{transform:translateX(0);}
.up-header{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,rgba(232,93,117,.1),transparent);}
.up-title{font-size:1rem;font-weight:800;display:flex;align-items:center;gap:8px;}
.up-close{background:var(--surface2);border:none;color:var(--text2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.up-close:hover{background:var(--accent2);color:#fff;}
.up-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px;}
.up-section-label{font-size:.63rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:4px 5px;margin-top:4px;}
.urgent-card{background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:12px 13px;cursor:pointer;transition:all .2s;border-left:4px solid transparent;}
.urgent-card:hover{background:var(--surface3);}
.urgent-card.uc-d0{border-left-color:var(--accent2);background:rgba(232,93,117,.06);}
.urgent-card.uc-d1{border-left-color:var(--accent3);background:rgba(240,165,0,.05);}
.urgent-card.uc-d2{border-left-color:#5a607a;}
.urgent-card.uc-start{border-left-color:var(--accent);background:rgba(91,141,238,.06);}
.uc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px;}
.uc-name{font-size:.84rem;font-weight:700;flex:1;line-height:1.3;}
.uc-dday{font-size:.68rem;font-weight:800;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.uc-d0 .uc-dday{background:rgba(232,93,117,.18);color:var(--accent2);}
.uc-d1 .uc-dday{background:rgba(240,165,0,.16);color:var(--accent3);}
.uc-d2 .uc-dday{background:rgba(255,255,255,.06);color:var(--text2);}
.uc-start .uc-dday{background:rgba(91,141,238,.16);color:var(--accent);}
.uc-meta{font-size:.71rem;color:var(--text3);display:flex;gap:8px;flex-wrap:wrap;}
.up-empty{text-align:center;padding:48px 20px;color:var(--text3);}
.up-empty .ue-icon{font-size:2.8rem;margin-bottom:12px;}
.up-empty p{font-size:.82rem;line-height:1.6;}

/* ═══ TOAST ═══ */
#toastContainer{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:550;}
.toast{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:11px;padding:12px 16px;box-shadow:0 8px 28px rgba(0,0,0,.4);min-width:230px;max-width:290px;animation:tIn .3s ease;display:flex;gap:10px;align-items:flex-start;}
.toast-icon{font-size:1.1rem;flex-shrink:0;}
.toast-body{flex:1;}
.toast-title{font-weight:700;font-size:.82rem;margin-bottom:2px;}
.toast-msg{font-size:.73rem;color:var(--text2);}
@keyframes tIn{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:translateX(0)}}
@keyframes tOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(22px)}}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  header{padding:11px 13px;}
  .logo{font-size:1.05rem;}
  #monthLabel{min-width:88px;font-size:.85rem;}
  .today-btn{display:none;}
  .cal-cell{min-height:75px;padding:5px 3px 3px;}
  .task-bar{height:20px;font-size:.59rem;padding:0 3px;}
  .calendar-wrap{padding:6px 8px 20px;}
  .modal{padding:20px 17px;}
  .form-row{grid-template-columns:1fr;}
  #toastContainer{bottom:10px;right:8px;left:8px;}
  .urgent-panel{width:100%;}
}
@media(max-width:420px){
  .day-label{font-size:.59rem;}
  .day-num{font-size:.66rem;min-width:18px;height:18px;}
  .cal-cell{min-height:58px;border-radius:8px;}
  .task-bar{height:17px;font-size:.55rem;}
  .hbtn-urgent{font-size:.72rem;padding:7px 10px;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <div class="logo">📋 Scheduler</div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <div id="monthLabel"></div>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="header-right">
    <button class="hbtn hbtn-ghost today-btn" onclick="goToday()">오늘</button>
    <button class="hbtn hbtn-urgent" onclick="openUrgent()">
      🚨 긴급업무
      <span class="urgent-count" id="urgentCount"></span>
    </button>
    <button class="hbtn hbtn-add" onclick="openModal()">+ 등록</button>
  </div>
</header>

<!-- 알림 허용 배너 -->
<div class="notif-banner hidden" id="notifBanner">
  <span>🔔 백그라운드 알람을 받으려면 알림을 허용해 주세요.</span>
  <button onclick="requestNotifPermission()">알림 허용</button>
</div>
<div class="notif-banner notif-denied hidden" id="notifDenied">

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let tasks = JSON.parse(localStorage.getItem('sched_v3') || '[]');
function saveTasks(){ localStorage.setItem('sched_v3', JSON.stringify(tasks)); }

const today    = new Date();
const todayStr = fmtDate(today);
let curYear    = today.getFullYear();
let curMonth   = today.getMonth();
let editingId    = null;
let detailTaskId = null;
let currentType  = 'task';

// alarm queue
let alarmQueue  = [];
let alarmActive = false;

// Service Worker registration
let swReg = null;

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function fmtDate(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function addDays(s,n){ const d=new Date(s); d.setDate(d.getDate()+n); return fmtDate(d); }
function diffDays(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }

// ═══════════════════════════════════════════
//  SERVICE WORKER + PUSH NOTIFICATION
// ═══════════════════════════════════════════
async function initServiceWorker(){
  if(!('serviceWorker' in navigator)) return;
  try {
    swReg = await navigator.serviceWorker.register('./sw.js');
    console.log('[SW] 등록 완료');

    // 메시지 수신 (SW → 앱)
    navigator.serviceWorker.addEventListener('message', e => {
      if(e.data && e.data.type === 'ALARM_FIRE'){
        pushAlarm(e.data.alarm);
      }
    });

    checkNotifPermission();
  } catch(e){
    console.warn('[SW] 등록 실패:', e);
  }
}

function checkNotifPermission(){
  if(!('Notification' in window)) return;
  if(Notification.permission === 'default'){
    document.getElementById('notifBanner').classList.remove('hidden');
  } else if(Notification.permission === 'denied'){
    document.getElementById('notifDenied').classList.remove('hidden');
  }
}

async function requestNotifPermission(){
  if(!('Notification' in window)) return;
  const result = await Notification.requestPermission();
  document.getElementById('notifBanner').classList.add('hidden');
  if(result === 'denied'){
    document.getElementById('notifDenied').classList.remove('hidden');
  } else if(result === 'granted'){
    showToast('알림 허용됨','백그라운드 알람이 활성화되었습니다.','🔔');
  }
}

// 브라우저 네이티브 알림 발송
function sendNativeNotif(alarm){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;

  // SW가 있으면 SW를 통해 발송 (백그라운드 지원)
  if(swReg && swReg.showNotification){
    swReg.showNotification(alarm.kind + ' — ' + alarm.taskTitle, {
      body: alarm.sub || '',
      icon: './icon-192.png',
      badge: './icon-72.png',
      tag: 'alarm-' + (alarm.taskId || Date.now()),
      renotify: true,
      requireInteraction: true,
      vibrate: [200,100,200,100,200],
      data: { alarm }
    });
  } else {
    // 폴백: 기본 Notification API
    new Notification(alarm.kind + ' — ' + alarm.taskTitle, {
      body: alarm.sub || '',
      tag: 'alarm-' + Date.now(),
      requireInteraction: true,
    });
  }
}

// ═══════════════════════════════════════════
//  MONTH NAV
// ═══════════════════════════════════════════
function changeMonth(d){
  curMonth+=d;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  renderCalendar();
}
function goToday(){ curYear=today.getFullYear(); curMonth=today.getMonth(); renderCalendar(); }

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function renderCalendar(){
  document.getElementById('monthLabel').textContent=
    curYear+'년 '+String(curMonth+1).padStart(2,'0')+'월';

  const grid=document.getElementById('calGrid');
  grid.innerHTML='';

  const firstDay=new Date(curYear,curMonth,1).getDay();
  const daysInMonth=new Date(curYear,curMonth+1,0).getDate();
  const daysInPrev=new Date(curYear,curMonth,0).getDate();
  const totalCells=Math.ceil((firstDay+daysInMonth)/7)*7;

  for(let i=0;i<totalCells;i++){
    let d,m,y,isOther=false;
    if(i<firstDay){
      d=daysInPrev-firstDay+i+1; m=curMonth-1; y=curYear; isOther=true;
      if(m<0){m=11;y--;}
    } else if(i>=firstDay+daysInMonth){
      d=i-firstDay-daysInMonth+1; m=curMonth+1; y=curYear; isOther=true;
      if(m>11){m=0;y++;}
    } else {
      d=i-firstDay+1; m=curMonth; y=curYear;
    }
    const ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday=ds===todayStr;
    const dow=i%7;

    const cell=document.createElement('div');
    cell.className='cal-cell'+(isOther?' other-month':'')+(isToday?' today':'')+(dow===0?' sun':'')+(dow===6?' sat':'');

    const dn=document.createElement('div');
    dn.className='day-num'; dn.textContent=d;
    cell.appendChild(dn);

    const dayTasks=getTasksForDate(ds);
    const MAX=3;
    dayTasks.slice(0,MAX).forEach(t=>cell.appendChild(makeBar(t,ds)));
    if(dayTasks.length>MAX){
      const mb=document.createElement('div');
      mb.className='more-badge';
      mb.textContent='+'+(dayTasks.length-MAX)+'개';
      cell.appendChild(mb);
    }
    if(hasAlarm(ds)){
      const ab=document.createElement('div');
      ab.className='alarm-badge'; ab.textContent='!';
      cell.appendChild(ab);
    }
    grid.appendChild(cell);
  }
  updateUrgentCount();
}

function getTasksForDate(ds){
  const res=[];
  tasks.forEach(t=>{
    if(t.type==='meeting'){
      if(t.start===ds) res.push({...t,_role:'meeting'});
    } else {
      const s=t.start, e=t.end||t.start;
      if(ds>=s&&ds<=e) res.push({...t,_role:ds===e?'deadline':'task'});
    }
  });
  return res;
}

function makeBar(t,ds){
  const bar=document.createElement('div');
  let cls='task-bar ';
  if(t.done) cls+='cat-done';
  else if(t._role==='meeting') cls+='cat-meet';
  else if(t._role==='deadline') cls+='cat-dead';
  else cls+='cat-task';
  bar.className=cls;

  const icon=t.done?'✓':t._role==='meeting'?'💬':t._role==='deadline'?'⚠':'📌';
  if(!t.done&&isAlarmDate(t,ds)){
    const dot=document.createElement('div'); dot.className='tb-dot'; bar.appendChild(dot);
  }
  const ic=document.createElement('span'); ic.className='tb-icon'; ic.textContent=icon;
  const lb=document.createElement('span'); lb.className='tb-label';
  lb.textContent=(t.type==='meeting'&&t.time)?t.time+' '+t.title:t.title;
  bar.appendChild(ic); bar.appendChild(lb);
  bar.onclick=e=>{e.stopPropagation();showDetail(t.id,e);};
  return bar;
}

function isAlarmDate(t,ds){
  if(t.done) return false;
  if(t.type==='meeting') return t.start===ds;
  const e=t.end||t.start;
  return ds===t.start||ds===addDays(e,-2);
}
function hasAlarm(ds){ return tasks.some(t=>!t.done&&isAlarmDate(t,ds)); }

// ═══════════════════════════════════════════
//  DETAIL POPUP
// ═══════════════════════════════════════════
function showDetail(id,e){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  detailTaskId=id;

  document.getElementById('dp-title').textContent=t.title;
  document.getElementById('dp-type').textContent=t.type==='meeting'?'💬 회의':'📌 업무';
  document.getElementById('dp-start').textContent=t.start;

  // 마감일 row: 업무만 표시
  document.getElementById('dp-end-row').style.display=t.type==='task'?'flex':'none';
  document.getElementById('dp-end').textContent=t.end||'-';
  document.getElementById('dp-days-row').style.display=(t.type==='task'&&t.days)?'flex':'none';
  document.getElementById('dp-days').textContent=t.days?t.days+'일':'-';

  document.getElementById('dp-time-row').style.display=t.type==='meeting'?'flex':'none';
  document.getElementById('dp-time').textContent=t.time||'-';
  document.getElementById('dp-memo-row').style.display=t.memo?'flex':'none';
  document.getElementById('dp-memo').textContent=t.memo||'';

  document.getElementById('da-edit-btn').style.display=t.done?'none':'';
  document.getElementById('da-done-btn').style.display=t.done?'none':'';

  const popup=document.getElementById('detailPopup');
  popup.classList.add('show');

  const rect=e.target.getBoundingClientRect();
  const pw=270,ph=240;
  let left=rect.left+window.scrollX;
  let top=rect.bottom+window.scrollY+6;
  if(left+pw>window.innerWidth-8) left=window.innerWidth-pw-8;
  if(top+ph>window.innerHeight+window.scrollY-8) top=rect.top+window.scrollY-ph-6;
  if(left<6) left=6;
  popup.style.left=left+'px'; popup.style.top=top+'px';
}

function closeDetail(){ document.getElementById('detailPopup').classList.remove('show'); }
document.addEventListener('click',e=>{
  const p=document.getElementById('detailPopup');
  if(!p.contains(e.target)&&!e.target.closest('.task-bar')) p.classList.remove('show');
});

function markDone(){
  if(!detailTaskId) return;
  tasks=tasks.map(t=>t.id===detailTaskId?{...t,done:true}:t);
  saveTasks(); renderCalendar(); closeDetail();
  showToast('완료 처리','업무가 완료되었습니다.','✅');
}
function deleteTask(){
  if(!detailTaskId) return;
  const t=tasks.find(x=>x.id===detailTaskId);
  if(!confirm('"'+t?.title+'" 을(를) 삭제하시겠습니까?')) return;
  tasks=tasks.filter(t=>t.id!==detailTaskId);
  saveTasks(); renderCalendar(); closeDetail();
  showToast('삭제됨','업무가 삭제되었습니다.','🗑️');
}
function editTask(){
  if(!detailTaskId) return;
  const t=tasks.find(x=>x.id===detailTaskId); if(!t) return;
  closeDetail();
  editingId=t.id;
  document.getElementById('modalTitleText').textContent='✏️ 업무 수정';
  document.getElementById('f-title').value=t.title;
  document.getElementById('f-memo').value=t.memo||'';

  if(t.type==='meeting'){
    document.getElementById('f-meet-date').value=t.start;
    document.getElementById('f-time').value=t.time||'';
    document.getElementById('f-start').value='';
    document.getElementById('f-end').value='';
    document.getElementById('f-days').value='';
  } else {
    document.getElementById('f-start').value=t.start;
    document.getElementById('f-end').value=t.end||'';
    document.getElementById('f-days').value=t.days||'';
    document.getElementById('f-meet-date').value='';
    document.getElementById('f-time').value='';
  }
  setType(t.type);
  document.getElementById('modalOverlay').classList.add('open');
}

// ═══════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════
function setType(t){
  currentType=t;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.toggle('active',b.dataset.t===t));
  const box=document.getElementById('modalBox');
  if(t==='meeting'){
    box.classList.add('showing-meeting');
  } else {
    box.classList.remove('showing-meeting');
  }
}

function openModal(){
  editingId=null;
  document.getElementById('modalTitleText').textContent='업무 등록';
  document.getElementById('f-title').value='';
  document.getElementById('f-start').value='';
  document.getElementById('f-end').value='';
  document.getElementById('f-days').value='';
  document.getElementById('f-meet-date').value='';
  document.getElementById('f-time').value='';
  document.getElementById('f-memo').value='';
  setType('task');
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e){ if(e.target.id==='modalOverlay') closeModal(); }

function saveTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){alert('업무명을 입력하세요.');return;}

  let start, end, days, time;
  const memo=document.getElementById('f-memo').value.trim();

  if(currentType==='meeting'){
    start=document.getElementById('f-meet-date').value;
    if(!start){alert('회의 날짜를 선택하세요.');return;}
    time=document.getElementById('f-time').value;
    if(!time){alert('회의 시간을 입력하세요.');return;}
    end=start; days=null;
  } else {
    start=document.getElementById('f-start').value;
    if(!start){alert('시작일을 선택하세요.');return;}
    end=document.getElementById('f-end').value||start;
    days=parseInt(document.getElementById('f-days').value)||null;
    time='';
  }

  const orig=editingId?tasks.find(t=>t.id===editingId):null;
  const task={
    id:editingId||Date.now(),
    type:currentType, title, start, end, days, time, memo,
    done:orig?orig.done:false,
    created:orig?orig.created:new Date().toISOString()
  };

  if(editingId) tasks=tasks.map(t=>t.id===editingId?task:t);
  else          tasks.push(task);

  saveTasks(); renderCalendar(); closeModal();
  showToast(editingId?'수정 완료':'등록 완료','"'+title+'" '+(editingId?'수정':'등록')+'되었습니다.','📌');
  scheduleAlarms(task);
}

// ═══════════════════════════════════════════
//  ALARM POPUP (앱 내)
// ═══════════════════════════════════════════
function pushAlarm(cfg){
  alarmQueue.push(cfg);
  if(!alarmActive) showNextAlarm();
}

function showNextAlarm(){
  if(alarmQueue.length===0){alarmActive=false;return;}
  alarmActive=true;
  const cfg=alarmQueue[0];

  document.getElementById('alarmHeader').className='alarm-header '+cfg.type;
  document.getElementById('alarmIcon').textContent=cfg.icon;
  document.getElementById('alarmKind').textContent=cfg.kind;
  document.getElementById('alarmTitle').textContent=cfg.taskTitle;
  document.getElementById('alarmSub').textContent=cfg.sub||'';

  const meta=document.getElementById('alarmMeta');
  meta.innerHTML='';
  (cfg.meta||[]).forEach(function(row){
    const div=document.createElement('div');
    div.className='alarm-meta-row';
    div.innerHTML='<span>'+row[0]+'</span><span>'+row[1]+'</span>';
    meta.appendChild(div);
  });

  document.getElementById('alarmQueueInfo').textContent=
    alarmQueue.length>1?'대기 중인 알람 '+(alarmQueue.length-1)+'개':'';

  document.getElementById('alarmOverlay').classList.add('open');
  playBeep(cfg.type);
  if(navigator.vibrate) navigator.vibrate([200,100,200,100,200]);
}

function confirmAlarm(){
  alarmQueue.shift();
  document.getElementById('alarmOverlay').classList.remove('open');
  setTimeout(showNextAlarm,350);
}

function playBeep(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const seqs={
      'type-start':  [[520,.12],[640,.18]],
      'type-warn':   [[880,.09],[0,.05],[880,.09],[0,.05],[880,.2]],
      'type-meet2h': [[440,.14],[550,.18]],
      'type-meet0':  [[600,.09],[750,.09],[900,.22]]
    };
    const seq=seqs[type]||seqs['type-start'];
    let t=ctx.currentTime+.05;
    seq.forEach(function(s){
      if(s[0]===0){t+=s[1];return;}
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value=s[0]; osc.type='sine';
      gain.gain.setValueAtTime(.32,t);
      gain.gain.exponentialRampToValueAtTime(.001,t+s[1]);
      osc.start(t); osc.stop(t+s[1]+.02);
      t+=s[1]+.02;
    });
  }catch(e){}
}

// ═══════════════════════════════════════════
//  ALARM SCHEDULING
// ═══════════════════════════════════════════
function buildAlarmCfg(type, task, overrides){
  const base={
    'type-start':  {icon:'📌', kind:'업무 시작일 알림',  sub:'오늘 시작하는 업무입니다'},
    'type-warn':   {icon:'⚠️', kind:'마감 2일 전 경고',   sub:'마감일('+task.end+')까지 2일 남았습니다'},
    'type-meet2h': {icon:'⏰', kind:'회의 2시간 전 알림', sub:'오늘 '+task.time+' 에 회의가 있습니다'},
    'type-meet0':  {icon:'🚀', kind:'회의 시작!',          sub:'지금 회의가 시작됩니다'},
  }[type];
  return Object.assign({type, taskId:task.id, taskTitle:task.title}, base, overrides||{});
}

function fireAlarm(cfg){
  // 앱 내 팝업
  pushAlarm(cfg);
  // 백그라운드 네이티브 알림
  sendNativeNotif(cfg);
}

function scheduleAlarms(task){
  const now=new Date();

  if(task.type==='meeting'&&task.time&&task.start){
    const meetDt=new Date(task.start+'T'+task.time);
    const ms2h=meetDt.getTime()-2*3600000-now.getTime();
    const ms0=meetDt.getTime()-now.getTime();

    if(ms2h>0) setTimeout(function(){
      fireAlarm(buildAlarmCfg('type-meet2h',task,{
        meta:[['날짜',task.start],['시간',task.time],['남은시간','약 2시간']]
      }));
    },ms2h);

    if(ms0>0) setTimeout(function(){
      fireAlarm(buildAlarmCfg('type-meet0',task,{
        meta:[['날짜',task.start],['시간',task.time]]
      }));
    },ms0);

  } else {
    if(task.start){
      const st=new Date(task.start+'T09:00:00').getTime()-now.getTime();
      if(st>0) setTimeout(function(){
        fireAlarm(buildAlarmCfg('type-start',task,{
          meta:[['시작일',task.start],['마감일',task.end||task.start],['소요일',task.days?task.days+'일':'-']]
        }));
      },st);
    }
    if(task.end){
      const d2=new Date(addDays(task.end,-2)+'T09:00:00').getTime()-now.getTime();
      if(d2>0) setTimeout(function(){
        fireAlarm(buildAlarmCfg('type-warn',task,{
          meta:[['마감일',task.end],['D-Day','D-2'],['소요일',task.days?task.days+'일':'-']]
        }));
      },d2);
    }
  }
}

// 앱 로드 시 오늘 해당 알람 즉시 확인
function checkTodayAlarms(){
  const nowH=today.getHours();
  const pending=[];

  tasks.filter(t=>!t.done).forEach(t=>{
    if(t.type==='meeting'&&t.start===todayStr&&t.time){
      const hh=parseInt(t.time.split(':')[0]);
      const diff=hh-nowH;
      if(diff<=2&&diff>0) pending.push(buildAlarmCfg('type-meet2h',t,{
        meta:[['날짜',t.start],['시간',t.time]]
      }));
      if(diff<=0&&diff>-1) pending.push(buildAlarmCfg('type-meet0',t,{
        meta:[['날짜',t.start],['시간',t.time]]
      }));
    } else if(t.type!=='meeting'){
      if(t.start===todayStr) pending.push(buildAlarmCfg('type-start',t,{
        meta:[['시작일',t.start],['마감일',t.end||t.start]]
      }));
      if(addDays(t.end||t.start,-2)===todayStr) pending.push(buildAlarmCfg('type-warn',t,{
        meta:[['마감일',t.end||t.start],['D-Day','D-2']]
      }));
    }
  });

  pending.forEach(function(a,i){
    setTimeout(function(){ fireAlarm(a); }, 900+i*300);
  });
}

// ═══════════════════════════════════════════
//  URGENT PANEL (회의 제외 — 업무만)
// ═══════════════════════════════════════════
function getUrgentItems(){
  const items=[];
  // 업무(task)만, 회의(meeting) 제외
  tasks.filter(t=>!t.done && t.type!=='meeting').forEach(t=>{
    const end=t.end||t.start;
    const dEnd=diffDays(todayStr,end);
    const dStart=diffDays(todayStr,t.start);

    if(t.start===todayStr){
      items.push({task:t,urgency:-1,label:'시작일',cls:'uc-start',reason:'오늘 시작',date:t.start});
    } else if(dEnd===0){
      items.push({task:t,urgency:0,label:'D-0',cls:'uc-d0',reason:'오늘 마감',date:end});
    } else if(dEnd===1){
      items.push({task:t,urgency:1,label:'D-1',cls:'uc-d1',reason:'내일 마감',date:end});
    } else if(dEnd===2){
      items.push({task:t,urgency:2,label:'D-2',cls:'uc-d2',reason:'마감 2일 전',date:end});
    } else if(dStart>0&&dStart<=7){
      items.push({task:t,urgency:dStart+10,label:'D-'+dStart,cls:'uc-start',reason:'시작 예정',date:t.start});
    }
  });
  items.sort(function(a,b){return a.urgency-b.urgency;});
  return items;
}

function updateUrgentCount(){
  const n=getUrgentItems().length;
  const badge=document.getElementById('urgentCount');
  if(n>0){badge.textContent=n>9?'9+':n;badge.classList.add('show');}
  else{badge.classList.remove('show');}
}

function openUrgent(){
  const items=getUrgentItems();
  const body=document.getElementById('urgentBody');
  body.innerHTML='';

  if(items.length===0){
    body.innerHTML='<div class="up-empty"><div class="ue-icon">🎉</div><p>긴급한 업무가 없습니다!<br>모든 업무가 여유롭습니다.</p></div>';
  } else {
    const groups=[
      {label:'🔴 즉시 처리', filter:i=>i.urgency<0||i.cls==='uc-d0'},
      {label:'🟡 임박한 마감',filter:i=>i.cls==='uc-d1'||i.cls==='uc-d2'},
      {label:'🔵 시작 예정', filter:i=>i.cls==='uc-start'&&i.urgency>2},
    ];
    groups.forEach(function(g){
      const grp=items.filter(g.filter);
      if(!grp.length) return;
      const sl=document.createElement('div');
      sl.className='up-section-label'; sl.textContent=g.label;
      body.appendChild(sl);
      grp.forEach(function(item){
        const card=document.createElement('div');
        card.className='urgent-card '+item.cls;
        card.innerHTML=
          '<div class="uc-top">'+
            '<div class="uc-name">📌 '+item.task.title+'</div>'+
            '<div class="uc-dday">'+item.label+'</div>'+
          '</div>'+
          '<div class="uc-meta">'+item.reason+' · '+item.date+'</div>';
        card.onclick=function(){
          closeUrgent();
          const d=new Date(item.date);
          curYear=d.getFullYear(); curMonth=d.getMonth(); renderCalendar();
        };
        body.appendChild(card);
      });
    });
  }
  document.getElementById('urgentOverlay').classList.add('open');
}
function closeUrgent(){ document.getElementById('urgentOverlay').classList.remove('open'); }
function closeUrgentOutside(e){ if(e.target.id==='urgentOverlay') closeUrgent(); }

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
function showToast(title,msg,icon){
  icon=icon||'🔔';
  const c=document.getElementById('toastContainer');
  const el=document.createElement('div');
  el.className='toast';
  el.innerHTML='<div class="toast-icon">'+icon+'</div><div class="toast-body"><div class="toast-title">'+title+'</div><div class="toast-msg">'+msg+'</div></div>';
  c.appendChild(el);
  setTimeout(function(){
    el.style.animation='tOut .3s ease forwards';
    setTimeout(function(){el.remove();},300);
  },3500);
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
(function init(){
  renderCalendar();
  initServiceWorker();
  setTimeout(checkTodayAlarms, 1000);
  tasks.filter(t=>!t.done).forEach(scheduleAlarms);
})();
</script>
